server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/css
    text/plain
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /index.html { return 301 /; }
  location = /sobre.html { return 301 /sobre; }
  location = /opera-os.html { return 301 /opera-os; }
  location = /contato.html { return 301 /contato; }

  location ~ ^/(sobre|opera-os|contato)/$ {
    return 301 /$1;
  }

  location ~* \.(?:css|js|mjs|map|png|jpe?g|gif|svg|webp|avif|ico|woff2?|ttf|otf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  location ~* \.mp4$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
    add_header Accept-Ranges "bytes" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri/index.html $uri.html $uri =404;
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }
}
