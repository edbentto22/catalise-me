<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada · Catalise.me</title>
  <meta name="description" content="A página que você procura não existe. Volte para a Catalise.me.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://catalise.me/">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(107, 158, 17, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .error-404 {
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--green);
      opacity: 0.08;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      user-select: none;
      pointer-events: none;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .error-symbol {
      margin: 0 auto var(--space-8);
      animation: symbolPulse 3s ease-in-out infinite, symbolFloat 6s ease-in-out infinite;
    }

    .error-title {
      font-size: var(--text-3xl);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-4);
    }

    .error-desc {
      font-size: var(--text-lg);
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: var(--space-10);
    }

    .error-links {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Navegação principal">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Catalise.me — Página inicial">
        <img src="assets/logo.png" alt="Catalise.me" class="nav-logo-img" width="420" height="84">
      </a>
      <div class="nav-cta">
        <a href="index.html" class="btn btn-secondary btn-sm">← Voltar para o início</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="error-page">
      <div class="error-404" aria-hidden="true">404</div>

      <div class="error-content">
        <svg class="error-symbol" width="80" height="80" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="errGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--green)"/>
              <stop offset="100%" stop-color="var(--green-glow)"/>
            </linearGradient>
          </defs>
          <g fill="url(#errGrad)" opacity="0.4">
            <rect x="52" y="2" width="16" height="44" rx="8"/>
            <rect x="52" y="74" width="16" height="44" rx="8"/>
            <rect x="2" y="52" width="44" height="16" rx="8"/>
            <rect x="74" y="52" width="44" height="16" rx="8"/>
            <rect x="15" y="7.5" width="16" height="44" rx="8" transform="rotate(-45 15 7.5)"/>
            <rect x="89" y="7.5" width="16" height="44" rx="8" transform="rotate(45 89 7.5)"/>
            <rect x="15" y="112.5" width="16" height="44" rx="8" transform="rotate(45 15 112.5)"/>
            <rect x="89" y="112.5" width="16" height="44" rx="8" transform="rotate(-45 89 112.5)"/>
          </g>
        </svg>

        <p class="eyebrow" style="justify-content: center;">Erro 404</p>
        <h1 class="error-title">
          Esta página não existe.<br><em>Mas sua operação pode.</em>
        </h1>
        <p class="error-desc">
          O link que você tentou acessar não está aqui. Talvez tenha mudado, ou nunca existiu.<br>
          A gente te leva de volta ao que importa.
        </p>

        <div class="error-links">
          <a href="index.html" class="btn btn-primary btn-lg" id="404-home">
            Ir para a Home <span class="btn-arrow">→</span>
          </a>
          <a href="contato.html" class="btn btn-secondary btn-lg" id="404-contato">
            Falar com a gente
          </a>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./js/nav.js"></script>
</body>
</html>
